{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0 fw-bold">分類管理</h2>
        </div>

        <!-- 新增分類區塊 -->
        <div class="card shadow-sm border-0 mb-4 bg-white">
            <div class="card-body rounded">
                <form action="{{ url_for('category.category_create') }}" method="POST" class="row g-2 align-items-center">
                    <div class="col-auto">
                        <label for="name" class="col-form-label fw-semibold text-secondary">建立新分類：</label>
                    </div>
                    <div class="col">
                        <input type="text" name="name" id="name" class="form-control bg-light border-0" placeholder="例如：工作、學習、生活雜事..." required>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-success shadow-sm px-4">
                            <i class="bi bi-plus-lg"></i> 新增
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 分類列表清單 -->
        {% if categories %}
        <div class="card shadow-sm border-0 overflow-hidden">
            <ul class="list-group list-group-flush">
                {% for category in categories %}
                <li class="list-group-item py-3 d-flex justify-content-between align-items-center bg-white hover-bg-light transition-all">
                    <!-- 顯示模式（預設） -->
                    <div id="view-mode-{{ category.id }}" class="w-100 d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-3">
                            <span class="fs-5 fw-semibold text-dark"><i class="bi bi-folder2 text-warning me-2"></i>{{ category.name }}</span>
                            <span class="badge bg-light text-dark border rounded-pill">{{ category.tasks.count() }} 項任務</span>
                        </div>
                        <div class="d-flex align-items-center gap-1 opacity-75 hover-opacity-100">
                            <button type="button" class="btn btn-sm btn-light text-primary border-0" onclick="toggleEditMode({{ category.id }})" title="編輯">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <form action="{{ url_for('category.category_delete', id=category.id) }}" method="POST" class="d-inline border-0 p-0 m-0" onsubmit="return confirm('確定要刪除「{{ category.name }}」此分類嗎？包含的任務不會被刪除，但會退回無分類。');">
                                <button type="submit" class="btn btn-sm btn-light text-danger border-0" title="刪除">
                                    <i class="bi bi-trash3"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                    
                    <!-- 編輯模式（預設隱藏） -->
                    <div id="edit-mode-{{ category.id }}" class="w-100 d-none bg-light p-2 rounded">
                        <form action="{{ url_for('category.category_edit', id=category.id) }}" method="POST" class="d-flex w-100 gap-2 m-0 p-0">
                            <input type="text" name="name" class="form-control form-control-sm border-primary" value="{{ category.name }}" required>
                            <button type="submit" class="btn btn-sm btn-primary px-3 shadow-sm">儲存更新</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary px-3 bg-white" onclick="toggleEditMode({{ category.id }})">取消</button>
                        </form>
                    </div>
                </li>
                {% endfor %}
            </ul>
        </div>
        {% else %}
        <div class="alert alert-light text-center py-5 shadow-sm border-0 rounded-4 mt-5">
            <i class="bi bi-tags fs-1 text-muted d-block mb-3 opacity-50"></i>
            <h5 class="fw-bold">目前沒有任何標籤分類</h5>
            <p class="text-muted mb-0">利用上方的輸入框快速新增分類來歸納你的任務！</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
